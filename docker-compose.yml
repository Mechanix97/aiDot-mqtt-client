services:
  selenium:
    image: selenium/standalone-chrome:latest
    ports:
      - "7900:7900"
    shm_size: "2g"
    environment:
      - SE_NODE_MAX_SESSIONS=2
      - SE_VNC_NO_PASSWORD=1
    restart: unless-stopped

  app:
    build: .
    depends_on:
      - selenium
    env_file:
      - aiDot.env
    volumes:
      - ./data:/data
    restart: unless-stopped
